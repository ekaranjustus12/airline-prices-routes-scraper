name: Scrape Kenya Flights

on:
  schedule:
    - cron: '0 4,16 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # ← this is what was missing — allows the job to push commits

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install playwright pandas

      - name: Install Playwright browsers + system deps
        run: playwright install --with-deps chromium

      - name: Run scraper
        run: python kenya_flights_scraper/scraper_github.py

      - name: Commit updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kenya_flights_scraper/kenya_flights_esky.csv
          git diff --cached --quiet || git commit -m "auto: update flight prices $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
